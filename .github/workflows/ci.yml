name: CI

# Gate every push to main and every PR on the unit/integration suite. Before this
# workflow the only CI was desktop-release.yml (a build-on-tag job that never ran
# vitest), so the test suite never gated a release despite the publish-checklist's
# "tests must be green" rule — exactly how the capture-guard q030 regression shipped
# unnoticed at v0.10.1/v0.10.2.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The integration suite spawns the COMPILED CLI at dist/index.js
      # (tests/integration/*.test.ts and a few unit tests do
      # `const CLI = join(__dirname, '..', '..', 'dist', 'index.js')`), so the CLI
      # must be built BEFORE tests run. Locally the publish checklist always runs
      # `npm run build && npm test`; without this step CI has no dist/ and the whole
      # CLI-integration suite fails ENOENT — which is exactly why main went red while
      # local stayed green. `build:cli` (tsup) is sufficient: it emits a
      # self-contained dist/index.js and copies templates/agents/skill-packs/hooks.
      # The heavier dashboard build is skipped — no test reads dist/dashboard, and it
      # would need the dashboard's own deps installed.
      - name: Build the CLI
        run: npm run build:cli

      # `npm test` is bare `vitest` (watch mode), so pass `run` for a single
      # non-interactive pass. vitest is scoped to tests/**/*.test.ts; the
      # Playwright e2e specs under e2e/ are NOT run here.
      - name: Run unit + integration tests
        run: npm test -- run
