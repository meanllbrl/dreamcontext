[features]
codex_hooks = true

# dreamcontext:codex:start
# dreamcontext managed hooks for Codex
# SubagentStart, PreCompact, and agent-gating PreToolUse are Claude-specific and omitted here.
[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = "npx dreamcontext hook session-start"
timeout = 10

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "npx dreamcontext hook stop"
timeout = 5

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "npx dreamcontext hook user-prompt-submit"
timeout = 5

[[hooks.PostToolUse]]
matcher = "Edit|Write"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "npx dreamcontext hook post-tool-use"
timeout = 30

# dreamcontext:codex:end
